<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">Gestor de Eventos y Hackatones</div>
        <nav class="top-nav">
            <div class="perfil">
                <span class="nombre-perfil">Usuario</span>
                <img class="avatar-perfil" alt="Avatar usuario">
            </div>
        </nav>
    </header>

    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="eventos.html">Eventos y Hackatones</a>
            <a href="estadisticas.html">Estadísticas</a>
            <a href="historial.html">Historial de Participaciones</a>
            <a href="certificados.html">Certificados</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <section class="page-header">
            <h1>Historial de Participaciones</h1>
            <p>Conoce en qué eventos y hackatones has participado y revisa el estado de tus participaciones</p>
        </section>

        <section class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Evento</th>
                        <th>Fecha</th>
                        <th>Lugar</th>
                        <th>Inscripción</th>
                        <th>Asistencia</th>
                        <th>Estado evento</th>
                    </tr>
                </thead>
                <tbody id="historial-lista">
                </tbody>
            </table>
        </section>
    </main>

    <script>
        const historialLista = document.getElementById('historial-lista');
        const nombrePerfil = document.querySelector('.nombre-perfil');

        const token = localStorage.getItem('token');
        const usuarioGuardado = localStorage.getItem('usuario');

        if (usuarioGuardado) {
            const usuario = JSON.parse(usuarioGuardado);
            nombrePerfil.textContent = usuario.nombre;
        }

        if (!token) {
            alert('Debes iniciar sesión');
            window.location.href = 'login.html';
        }

        function crearEstado(texto) {
            if (texto === 'inscrito' || texto === 'asistio' || texto === 'finalizado') {
                return `<span class="status-pill status-completado">${texto}</span>`;
            }

            if (texto === 'pendiente' || texto === 'activo') {
                return `<span class="status-pill status-pendiente">${texto}</span>`;
            }

            return `<span class="status-pill">${texto}</span>`;
        }

        async function cargarHistorial() {
            try {
                const respuesta = await fetch('http://localhost:3000/api/inscripciones/mis-inscripciones', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const inscripciones = await respuesta.json();

                historialLista.innerHTML = '';

                if (inscripciones.length === 0) {
                    historialLista.innerHTML = `
                        <tr>
                            <td colspan="6">No tienes inscripciones registradas.</td>
                        </tr>
                    `;
                    return;
                }

                inscripciones.forEach(item => {
                    const fecha = new Date(item.fecha_inicio).toLocaleDateString();

                    const fila = document.createElement('tr');

                    fila.innerHTML = `
                        <td>${item.titulo}</td>
                        <td>${fecha}</td>
                        <td>${item.lugar}</td>
                        <td>${crearEstado(item.estado_inscripcion)}</td>
                        <td>${crearEstado(item.asistencia)}</td>
                        <td>${crearEstado(item.estado_evento)}</td>
                    `;

                    historialLista.appendChild(fila);
                });

            } catch (error) {
                historialLista.innerHTML = `
                    <tr>
                        <td colspan="6">Error al cargar el historial.</td>
                    </tr>
                `;
                console.error(error);
            }
        }

        cargarHistorial();
    </script>
</body>
</html>

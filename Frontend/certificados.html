<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">Gestor de Eventos y Hackatones</div>
        <nav class="top-nav">
            <div class="perfil">
                <button class="perfil-btn" id="btn-abrir-perfil">
                        <img src="Images/account_circle_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Perfil" class="perfil-icon">
                </button>
                <section class="profile-card" id="profile-card">
                    <button type="button" id="btn-cambiar-nombre" class="btn btn-secondary">Cambiar nombre de usuario</button><br>
                    <button type="button" id="btn-cambiar-contra" class="btn btn-secondary">Cambiar contraseña</button><br>
                    <button type="button" id="btn-cerrar-sesion" class="btn btn-secondary">Cerrar sesión</button> 
                </section>
            </div>
        </nav>
    </header>

    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="eventos.html">Eventos y Hackatones</a>
            <a href="estadisticas.html" class="link-admin">Estadísticas</a>
            <a href="historial.html">Historial de Participaciones</a>
            <a href="certificados.html">Certificados</a>
            <a href="adminpanel.html" class="link-admin">Panel de Administración</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <section class="page-header">
            <h1>Certificados</h1>
            <p>Genera tus certificados cuando el evento haya finalizado</p>
        </section>

        <section class="cards-grid" id="certificados-lista">
        </section>
    </main>

    <script>
        //eventos
        const btnPerfil = document.getElementById('btn-abrir-perfil');
        const profileCard = document.getElementById('profile-card');

         btnPerfil.addEventListener('click', () => {
            profileCard.classList.toggle('profile-card-visible');
        });
        //

        const certificadosLista = document.getElementById('certificados-lista');
        const nombrePerfil = document.querySelector('.nombre-perfil');

        const token = localStorage.getItem('token');
        const usuarioGuardado = localStorage.getItem('usuario');

        if (usuarioGuardado) {
            const usuario = JSON.parse(usuarioGuardado);
            nombrePerfil.textContent = usuario.nombre;
        }

        if (!token) {
            alert('Debes iniciar sesión');
            window.location.href = 'login.html';
        }

        async function cargarEventosInscritos() {
            try {
                const respuesta = await fetch('http://localhost:3000/api/inscripciones/mis-inscripciones', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const inscripciones = await respuesta.json();

                certificadosLista.innerHTML = '';

                if (inscripciones.length === 0) {
                    certificadosLista.innerHTML = '<p>No tienes eventos inscritos.</p>';
                    return;
                }

                inscripciones.forEach(item => {
                    const fecha = new Date(item.fecha_inicio).toLocaleDateString();

                    const card = document.createElement('article');
                    card.classList.add('card');

                    card.innerHTML = `
                        <h2>${item.titulo}</h2>
                        <p class="card-meta">Fecha: ${fecha}</p>
                        <p class="card-meta">Inscripción: ${item.estado_inscripcion}</p>
                        <p class="card-meta">Asistencia: ${item.asistencia}</p>
                        <p class="card-meta">Estado del evento: ${item.estado_evento}</p>
                        <p>${item.descripcion}</p>
                        <div class="card-actions">
                            <button class="btn btn-primary" onclick="generarCertificado(${item.id_evento})">
                                Generar certificado
                            </button>
                        </div>
                    `;

                    certificadosLista.appendChild(card);
                });

            } catch (error) {
                certificadosLista.innerHTML = '<p>Error al cargar certificados.</p>';
                console.error(error);
            }
        }

async function descargarPDF(urlCertificado) {
    try {
        const respuesta = await fetch(`http://localhost:3000${urlCertificado}`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (!respuesta.ok) {
            alert('No se pudo descargar el certificado');
            return;
        }

        const archivo = await respuesta.blob();
        const url = window.URL.createObjectURL(archivo);

        const enlace = document.createElement('a');
        enlace.href = url;
        enlace.download = 'certificado.pdf';
        document.body.appendChild(enlace);
        enlace.click();

        document.body.removeChild(enlace);
        window.URL.revokeObjectURL(url);

    } catch (error) {
        alert('Error al descargar el certificado');
        console.error(error);
    }
}

async function generarCertificado(idEvento) {
    try {
        const respuesta = await fetch(`http://localhost:3000/api/certificados/${idEvento}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        const datos = await respuesta.json();

        if (respuesta.ok) {
            if (datos.url_certificado) {
                alert(`Certificado generado correctamente. Código: ${datos.codigo_certificado}`);
                descargarPDF(datos.url_certificado);
            } else if (datos.certificado && datos.certificado.url_certificado) {
                alert(`Certificado ya generado. Código: ${datos.certificado.codigo_certificado}`);
                descargarPDF(datos.certificado.url_certificado);
            } else {
                alert(datos.mensaje);
            }
        } else {
            alert(datos.mensaje);
        }

    } catch (error) {
        alert('Error al generar certificado');
        console.error(error);
    }
}

    async function generarCertificado(idEvento) {
        try {
            const respuesta = await fetch(`http://localhost:3000/api/certificados/${idEvento}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            const datos = await respuesta.json();

            if (respuesta.ok) {
                if (datos.url_certificado) {
                    alert(`Certificado generado correctamente. Código: ${datos.codigo_certificado}`);
                    descargarPDF(datos.url_certificado);
                } else if (datos.certificado && datos.certificado.url_certificado) {
                    alert(`Certificado ya generado. Código: ${datos.certificado.codigo_certificado}`);
                    descargarPDF(datos.certificado.url_certificado);
                } else {
                    alert(datos.mensaje);
                }
            } else {
                alert(datos.mensaje);
            }

        } catch (error) {
            alert('Error al generar certificado');
            console.error(error);
        }
    }

        cargarEventosInscritos();
    </script>
    <script src="FrontendJS/certificados.js"></script>
</body>
</html>

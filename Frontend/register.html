<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestor de Eventos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="login-page">
        <section class="login-panel">
            <div class="brand">Gestor de Eventos y Hackatones</div>
            <h1>Crear Cuenta</h1>
            <p>Regístrate para poder participar</p>

            <form class="login-form" action="#" method="post">
                <label for="nombre_completo">Nombre completo</label>
                <input id="nombre_completo" name="nombre_completo" type="text" placeholder="Tu nombre completo" required>

                <label for="correo">Correo electrónico</label>
                <input id="correo" name="correo" type="email" placeholder="correo@ejemplo.com" required>

                <label for="usuario">Usuario</label>
                <input id="usuario" name="usuario" type="text" placeholder="Nombre de usuario" required>

                <label for="contrasena">Contraseña</label>
                <input id="contrasena" name="contrasena" type="password" placeholder="Crea una contraseña" required>

                <label for="confirmar_contrasena">Confirmar contraseña</label>
                <input id="confirmar_contrasena" name="confirmar_contrasena" type="password" placeholder="Repite la contraseña" required>

                <label for="rol">Rol</label>
                <select id="rol" name="rol" required>
                    <option value="" disabled selected>Selecciona tu rol</option>
                    <option value="estudiante">Estudiante</option>
                    <option value="docente">Docente</option>
                </select>

                <button type="submit">Registrarse</button>
            </form>

            <div class="register-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </section>
    </main>
</body>
</html>

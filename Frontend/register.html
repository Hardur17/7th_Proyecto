<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestor de Eventos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="login-page">
        <section class="login-panel">
            <div class="brand">Gestor de Eventos y Hackatones</div>
            <h1>Crear Cuenta</h1>
            <p>Regístrate para poder participar</p>

            <form id="registerForm" class="login-form">
                <label for="nombre">Nombre</label>
                <input id="nombre" name="nombre" type="text" placeholder="Tu nombre" required>

                <label for="apellido">Apellido</label>
                <input id="apellido" name="apellido" type="text" placeholder="Tu apellido" required>

                <label for="correo">Correo electrónico</label>
                <input id="correo" name="correo" type="email" placeholder="correo@ejemplo.com" required>

                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" placeholder="Crea una contraseña" required>

                <label for="confirmarPassword">Confirmar contraseña</label>
                <input id="confirmarPassword" name="confirmarPassword" type="password" placeholder="Repite la contraseña" required>

                <button type="submit">Registrarse</button>
            </form>

            <div class="register-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </section>
    </main>

    <script src="FrontendJS/register.js"></script>
</body>
</html>

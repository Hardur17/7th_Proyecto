<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de administrador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="form-card" id="form-card">
        <form class="form-evento" id="formEvento">
            <label for="titulo">Nombre del evento:</label>
            <input type="text" id="titulo" required>

            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" required></textarea>

            <label for="fecha_inicio">Fecha de inicio:</label>
            <input type="datetime-local" id="fecha_inicio" required>

            <label for="fecha_fin">Fecha de fin:</label>
            <input type="datetime-local" id="fecha_fin" required>

            <label for="lugar">Lugar:</label>
            <input type="text" id="lugar" required>

            <label for="cupos">Cupos:</label>
            <input type="number" id="cupos" min="1" required>

            <button type="submit" class="btn btn-primary btn-secondary">Guardar evento</button>
            <button type="button" id="btn-cancelar" class="btn btn-secondary">Cancelar</button>
        </form>
    </section>

    <header class="app-header">
        <div class="logo">Gestor de Eventos y Hackatones</div>
        <nav class="top-nav">
            <div class="perfil">
                <button class="perfil-btn" id="btn-abrir-perfil">
                    <img src="Images/account_circle_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Perfil" class="perfil-icon">
                </button>

                <section class="profile-card" id="profile-card">
                    <button type="button" id="btn-cambiar-nombre" class="btn btn-secondary">Cambiar nombre de usuario</button><br>
                    <button type="button" id="btn-cambiar-contra" class="btn btn-secondary">Cambiar contraseña</button><br>
                    <button type="button" id="btn-cerrar-sesion" class="btn btn-secondary">Cerrar sesión</button>
                </section>
            </div>
        </nav>
    </header>

    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="eventos.html">Eventos y Hackatones</a>
            <a href="estadisticas.html">Estadísticas</a>
            <a href="historial.html">Historial de Participaciones</a>
            <a href="certificados.html">Certificados</a>
            <a href="adminpanel.html">Panel de Administración</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <section class="page-header">
            <h1>Panel de administración</h1>
            <p>Crea y cancela eventos desde este panel.</p>
        </section>

        <section class="table-card">
            <h2>Eventos registrados</h2>

            <table>
                <thead>
                    <tr>
                        <th>Nombre del evento</th>
                        <th>Fecha de inicio</th>
                        <th>Fecha de fin</th>
                        <th>Estado</th>
                        <th>Lugar</th>
                        <th>Cupos</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-eventos"></tbody>
            </table>

            <section class="admin-actions">
                <button type="button" id="btn-crear-evento" class="btn btn-primary btn-secondary">
                    Crear nuevo evento
                </button>
            </section>
        </section>
    </main>

    <script src="FrontendJS/adminpanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gestor de Eventos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="login-page">
        <section class="login-panel">
            <div class="brand">Gestor de Eventos y Hackatones</div>
            <h1>¡Bienvenido!</h1>
            <p>Inicia sesión para continuar</p>
            <form id="loginForm" class="login-form">
                 <label for="correo">Correo electrónico</label>
                 <input id="correo" name="correo" type="email" placeholder="correo@ejemplo.com" required>

                    <label for="password">Contraseña</label>
                 <input id="password" name="password" type="password" placeholder="Tu contraseña" required>

                 <button type="submit">Iniciar sesión</button>
            </form>

            <div class="register-link">
                ¿No tienes cuenta? <a href="register.html">Regístrate ahora</a>
            </div>
        </section>
    </main>
    <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const correo = document.getElementById('correo').value;
        const password = document.getElementById('password').value;

        try {
            const respuesta = await fetch('http://localhost:3000/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    correo,
                    password
                })
            });

            const datos = await respuesta.json();

            if (respuesta.ok) {
                localStorage.setItem('token', datos.token);
                localStorage.setItem('usuario', JSON.stringify(datos.usuario));

                alert('Inicio de sesión exitoso');

                if (datos.usuario.rol === 'admin') {
                    window.location.href = 'estadisticas.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert(datos.mensaje);
            }

        } catch (error) {
            alert('Error al conectar con el servidor');
            console.error(error);
        }
    });
</script>
</body>
</html>

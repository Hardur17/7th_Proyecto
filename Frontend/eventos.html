<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos y Hackatones</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">Gestor de Eventos y Hackatones</div>
        <nav class="top-nav">
            <div class="perfil">
                <button class="perfil-btn" id="btn-abrir-perfil">
                        <img src="Images/account_circle_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Perfil" class="perfil-icon">
                </button>
                <section class="profile-card" id="profile-card">
                    <button type="button" id="btn-cambiar-nombre" class="btn btn-secondary">Cambiar nombre de usuario</button><br>
                    <button type="button" id="btn-cambiar-contra" class="btn btn-secondary">Cambiar contraseña</button><br>
                    <button type="button" id="btn-cerrar-sesion" class="btn btn-secondary">Cerrar sesión</button> 
                </section>
            </div>
        </nav>
    </header>

    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="eventos.html">Eventos y Hackatones</a>
            <a href="estadisticas.html">Estadísticas</a>
            <a href="historial.html">Historial de Participaciones</a>
            <a href="certificados.html">Certificados</a>
            <a href="adminpanel.html">Panel de Administración</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <section class="page-header">
            <h1>Eventos y Hackatones disponibles</h1>
            <p>Explora los eventos que están disponibles ahora mismo</p>
        </section>

        <section class="cards-grid" id="eventos-lista">
        </section>
    </main>

    <script>
        //eventos
        const btnPerfil = document.getElementById('btn-abrir-perfil');
        const profileCard = document.getElementById('profile-card');

         btnPerfil.addEventListener('click', () => {
            profileCard.classList.toggle('profile-card-visible');
        });
        //

        const listaEventos = document.getElementById('eventos-lista');
        const nombrePerfil = document.querySelector('.nombre-perfil');

        const usuarioGuardado = localStorage.getItem('usuario');

        if (usuarioGuardado) {
            const usuario = JSON.parse(usuarioGuardado);
            nombrePerfil.textContent = usuario.nombre;
        }

        async function cargarEventos() {
            try {
                const respuesta = await fetch('http://localhost:3000/api/eventos');
                const eventos = await respuesta.json();

                listaEventos.innerHTML = '';

                if (eventos.length === 0) {
                    listaEventos.innerHTML = '<p>No hay eventos disponibles por ahora.</p>';
                    return;
                }

                eventos.forEach(evento => {
                    const fecha = new Date(evento.fecha_inicio).toLocaleDateString();

                    const card = document.createElement('article');
                    card.classList.add('card');

                    card.innerHTML = `
                        <h2>${evento.titulo}</h2>
                        <p class="card-meta">Fecha: ${fecha}</p>
                        <p class="card-meta">Lugar: ${evento.lugar}</p>
                        <p class="card-meta">Cupos: ${evento.cupos}</p>
                        <p>${evento.descripcion}</p>
                        <div class="card-actions">
                            <button class="btn btn-primary" onclick="inscribirse(${evento.id_evento})">
                                Inscribirse
                            </button>
                        </div>
                    `;

                    listaEventos.appendChild(card);
                });

            } catch (error) {
                listaEventos.innerHTML = '<p>Error al cargar los eventos.</p>';
                console.error(error);
            }
        }

        async function inscribirse(idEvento) {
            const token = localStorage.getItem('token');

            if (!token) {
                alert('Debes iniciar sesión para inscribirte');
                window.location.href = 'login.html';
                return;
            }

            try {
                const respuesta = await fetch(`http://localhost:3000/api/inscripciones/${idEvento}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const datos = await respuesta.json();
                alert(datos.mensaje);

            } catch (error) {
                alert('Error al inscribirse al evento');
                console.error(error);
            }
        }

        cargarEventos();
    </script>
</body>
</html>
